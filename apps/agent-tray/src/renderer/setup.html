<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Настройка агента</title>
    <style>
      body {
        font: 13px/1.5 -apple-system, sans-serif;
        margin: 0;
        padding: 18px;
        color: #1a1a1a;
        background: #fafaf7;
      }
      h1 { font-size: 15px; margin: 0 0 8px; }
      p { margin: 0 0 12px; color: #555; }
      textarea {
        width: 100%;
        box-sizing: border-box;
        height: 84px;
        font-family: ui-monospace, monospace;
        font-size: 12px;
        resize: none;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 8px;
      }
      .row { display: flex; gap: 8px; align-items: center; margin-top: 12px; }
      button {
        padding: 7px 14px;
        border: 0;
        border-radius: 8px;
        background: #2a6;
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled { opacity: 0.5; cursor: default; }
      .err { color: #c33; margin-left: 4px; }
      .ok { color: #2a6; margin-left: 4px; }
    </style>
  </head>
  <body>
    <h1>Подключение к серверу</h1>
    <p>Вставьте строку подключения из веб-настроек (раздел «Агент» → «Скопировать строку подключения»).</p>
    <textarea id="conn" placeholder="vcagent:…" autofocus></textarea>
    <div class="row">
      <button id="save">Сохранить и подключиться</button>
      <span id="msg"></span>
    </div>
    <script type="module" src="./setup.ts"></script>
  </body>
</html>
