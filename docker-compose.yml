# voiceAIChat в контейнере: сервер + web на одном порту, claude/codex CLI внутри.
#
# Запуск:
#   docker compose up --build
#   → открыть http://localhost:8787
#
# Аутентификация claude/codex живёт ВНУТРИ контейнера (тома vc-claude/vc-codex),
# а не берётся с хоста. Логин выполняется один раз внутри контейнера:
#   docker compose exec -u node voicechat claude auth login   # или: claude setup-token
#   docker compose exec -u node voicechat codex login
# Токены сохраняются в томах и переживают пересоздание контейнера.

services:
  voicechat:
    build: .
    image: voicechat
    ports:
      - "8787:8787"
    environment:
      HOST: 0.0.0.0
      PORT: "8787"
      VC_DATA_DIR: /data
    volumes:
      # Персист БД (voicechat.db) и вложений.
      - vc-data:/data
      # Авторизация + история CLI внутри контейнера (rw: обновление токенов).
      # Именованные тома, а не bind-mount с хоста → логин делается в контейнере.
      - vc-claude:/home/node/.claude
      - vc-codex:/home/node/.codex
    restart: unless-stopped

  # HTTPS для доступа по IP: без secure-контекста браузер не даёт микрофон.
  caddy:
    image: caddy:2-alpine
    depends_on:
      - voicechat
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Локальный CA и выписанные сертификаты — переживают пересоздание.
      - vc-caddy:/data
    restart: unless-stopped

volumes:
  vc-data:
  vc-claude:
  vc-codex:
  vc-caddy:
